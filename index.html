<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yazım Kuralları Quiz</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
    color:white;
}

.container {
    background:white;
    color:black;
    padding:30px;
    border-radius:15px;
    width:350px;
    text-align:center;
}

button {
    padding:10px 15px;
    margin:8px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.correct { background:green; color:white; }
.wrong { background:red; color:white; }

.hidden { display:none; }
</style>
</head>
<body>

<div class="container">

<div id="menu">
<h2>Yazım Quizine Hoş Geldin</h2>
<button onclick="showCategories()">Kategori Seç</button>
<button onclick="showLibrary()">Kütüphane</button>
</div>

<div id="categories" class="hidden">
<h3>Kategori Seç</h3>
<button onclick="startGame('birlesik')">Birleşik</button>
<button onclick="startGame('de_da')">De / Da</button>
<button onclick="startGame('ki')">Ki</button>
<br><br>
<button onclick="goMenu()">Geri</button>
</div>

<div id="quiz" class="hidden">
<h3>Hangisi Doğru?</h3>
<div id="question"></div>
<button id="btn1"></button>
<button id="btn2"></button>
<br><br>
<button onclick="goMenu()">Menü</button>
</div>

<div id="library" class="hidden">
<h3>Kütüphane</h3>
<div id="libraryList"></div>
<br>
<button onclick="goMenu()">Geri</button>
</div>

</div>

<script>

let data = {};
let currentCategory = "";
let currentQuestion = null;

fetch("kelimeler.json")
.then(res => res.json())
.then(json => data = json);

function showCategories(){
    hideAll();
    document.getElementById("categories").classList.remove("hidden");
}

function showLibrary(){
    hideAll();
    document.getElementById("library").classList.remove("hidden");
    loadLibrary();
}

function goMenu(){
    hideAll();
    document.getElementById("menu").classList.remove("hidden");
}

function hideAll(){
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("categories").classList.add("hidden");
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("library").classList.add("hidden");
}

function startGame(category){
    currentCategory = category;
    hideAll();
    document.getElementById("quiz").classList.remove("hidden");
    nextQuestion();
}

function nextQuestion(){
    let list = data[currentCategory];
    currentQuestion = list[Math.floor(Math.random() * list.length)];

    let options = [currentQuestion.dogru, currentQuestion.yanlis];
    options.sort(() => Math.random() - 0.5);

    document.getElementById("question").innerText = "";

    let btn1 = document.getElementById("btn1");
    let btn2 = document.getElementById("btn2");

    btn1.className = "";
    btn2.className = "";

    btn1.innerText = options[0];
    btn2.innerText = options[1];

    btn1.onclick = () => checkAnswer(options[0], btn1);
    btn2.onclick = () => checkAnswer(options[1], btn2);
}

function checkAnswer(answer, button){
    if(answer === currentQuestion.dogru){
        button.classList.add("correct");
        saveLibrary(answer, true);
    } else {
        button.classList.add("wrong");
        saveLibrary(currentQuestion.dogru, false);
    }

    setTimeout(nextQuestion, 800);
}

function saveLibrary(word, isCorrect){
    let library = JSON.parse(localStorage.getItem("library")) || [];
    library.push({word, isCorrect});
    localStorage.setItem("library", JSON.stringify(library));
}

function loadLibrary(){
    let library = JSON.parse(localStorage.getItem("library")) || [];
    let div = document.getElementById("libraryList");
    div.innerHTML = "";

    library.slice(-20).forEach(item => {
        div.innerHTML += `<p>${item.word} - ${item.isCorrect ? "Doğru" : "Yanlış"}</p>`;
    });
}

</script>

</body>
</html>
