<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yazım Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Orbitron',sans-serif;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
  font-size:40px;
  text-shadow:0 0 15px cyan;
}

.container{
  margin-top:30px;
}

button{
  padding:10px 20px;
  margin:8px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

.correct{background:#00ff99;}
.wrong{background:#ff4d4d;}

button:hover{transform:scale(1.1);}

select{
  padding:8px;
  border-radius:6px;
  margin-top:15px;
}

.score{
  margin-top:15px;
  font-size:20px;
}

#leaderboard{
  margin-top:20px;
  width:300px;
  margin:auto;
  background:rgba(0,0,0,0.4);
  padding:10px;
  border-radius:10px;
}

.leader-item{
  border-bottom:1px solid gray;
  padding:4px;
}
</style>
</head>

<body>

<h1>⚡ YAZIM QUIZ ⚡</h1>

<!-- Kategori Seçimi -->
<select id="categorySelect">
  <option value="">Kategori Seç</option>
</select>

<!-- Başlat Butonu -->
<button id="startBtn">Başlat</button>

<!-- Kütüphane info -->
<div id="libraryInfo"></div>

<!-- Quiz Container: Başlatılınca görünür -->
<div class="container" id="quizContainer" style="display:none;">
  <h2 id="word">Yükleniyor...</h2>

  <button class="correct" onclick="checkAnswer(true)">Doğru</button>
  <button class="wrong" onclick="checkAnswer(false)">Yanlış</button>

  <div class="score">Skor: <span id="score">0</span></div>
  <div class="score">High Score: <span id="highScore">0</span></div>
</div>

<script>
let allData = {};
let words = [];
let currentWord;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

// JSON'dan kelimeleri çek
fetch("kelimeler.json")
  .then(res => res.json())
  .then(data => {
    allData = data;
    loadCategories();
  });

// Dropdown kategorileri doldur
function loadCategories() {
  const select = document.getElementById("categorySelect");
  select.innerHTML = "<option value=''>Kategori Seç</option>";

  Object.keys(allData).forEach(cat => {
    let option = document.createElement("option");
    option.value = cat;
    option.textContent = cat.toUpperCase();
    select.appendChild(option);
  });
}

// Başlat butonuna tıklandığında
document.getElementById("startBtn").addEventListener("click", () => {
  const selected = document.getElementById("categorySelect").value;
  if (!selected) return alert("Kategori seç!");

  words = [];
  allData[selected].forEach(item => {
    words.push({ word: item.dogru, correct: true });
    words.push({ word: item.yanlis, correct: false });
  });

  document.getElementById("libraryInfo").innerText =
    "Bu kategoride toplam " + words.length + " kelime var";

  score = 0;
  document.getElementById("score").innerText = score;

  // Quiz container görünür
  document.getElementById("quizContainer").style.display = "block";

  newWord();
});

// Yeni kelime göster
function newWord() {
  currentWord = words[Math.floor(Math.random() * words.length)];
  document.getElementById("word").innerText = currentWord.word;
}

// Doğru/Yanlış kontrol
function checkAnswer(answer) {
  if (answer === currentWord.correct) {
    score++;
  } else {
    score--;
  }
  document.getElementById("score").innerText = score;

  // High score kontrol
  if (score > highScore) {
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("highScore").innerText = highScore;
  }

  newWord();
}
</script>

</body>
  
</html>
