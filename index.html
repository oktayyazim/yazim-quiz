<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yazım Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:linear-gradient(135deg,#141e30,#243b55);
font-family:'Orbitron',sans-serif;
color:white;
text-align:center;
}

h1{
margin-top:30px;
font-size:45px;
text-shadow:0 0 15px cyan;
}

.container{
margin-top:40px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.correct{
background:#00ff99;
}

.wrong{
background:#ff4d4d;
}

.score{
font-size:22px;
margin-top:20px;
}

.user-area{
margin-top:30px;
}

.user-area input{
padding:10px;
border-radius:6px;
border:none;
text-align:center;
}

.user-area button{
background:cyan;
}

#leaderboard{
margin-top:20px;
width:300px;
margin-left:auto;
margin-right:auto;
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
}

.leader-item{
padding:5px;
border-bottom:1px solid gray;
}
</style>
</head>

<body>

<h1>⚡ YAZIM QUIZ ⚡</h1>

<div class="container">
<h2 id="word">Kelime</h2>

<button class="correct" onclick="checkAnswer(true)">Doğru</button>
<button class="wrong" onclick="checkAnswer(false)">Yanlış</button>

<div class="score">Skor: <span id="score">0</span></div>
</div>

<div class="user-area">
<input type="text" id="username" placeholder="Kullanıcı adın">
<button onclick="saveScore()">Skoru Kaydet</button>
</div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<script>

let words = [];
let currentWord;
let score = 0;

// JSON'dan kelimeleri çek
fetch("kelimeler.json")
  .then(response => response.json())
  .then(data => {

    // Kategorileri tek listeye çevir
    Object.keys(data).forEach(category => {
      data[category].forEach(item => {
        words.push({ word: item.dogru, correct: true });
        words.push({ word: item.yanlis, correct: false });
      });
    });

    newWord();
  });

function newWord(){
  currentWord = words[Math.floor(Math.random()*words.length)];
  document.getElementById("word").innerText = currentWord.word;
}

function checkAnswer(answer){
  if(answer === currentWord.correct){
    score++;
  } else {
    score--;
  }

  document.getElementById("score").innerText = score;
  newWord();
}

</script>

</body>
</html>
