<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yazım Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
}

h1{
margin-top:20px;
font-size:40px;
text-shadow:0 0 15px cyan;
}

.container{
margin-top:30px;
}

button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.correct{background:#00ff99;}
.wrong{background:#ff4d4d;}

button:hover{transform:scale(1.1);}

select{
padding:8px;
border-radius:6px;
margin-top:15px;
}

.score{
margin-top:15px;
font-size:20px;
}

#leaderboard{
margin-top:20px;
width:300px;
margin:auto;
background:rgba(0,0,0,0.4);
padding:10px;
border-radius:10px;
}

.leader-item{
border-bottom:1px solid gray;
padding:4px;
}
</style>
</head>

<body>

<h1>⚡ YAZIM QUIZ ⚡</h1>

<select id="categorySelect"></select>
<div id="libraryInfo"></div>

<div class="container">
<h2 id="word">Yükleniyor...</h2>

<button class="correct" onclick="checkAnswer(true)">Doğru</button>
<button class="wrong" onclick="checkAnswer(false)">Yanlış</button>

<div class="score">Skor: <span id="score">0</span></div>
</div>

<hr>

<input type="text" id="username" placeholder="Kullanıcı adı">
<button onclick="saveScore()">Skoru Kaydet</button>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<script>

let allData = {};
let words = [];
let currentWord;
let score = 0;

// JSON'dan çek
fetch("kelimeler.json")
.then(res=>res.json())
.then(data=>{
  allData = data;
  loadCategories();
  selectCategory();
  displayLeaderboard();
});

function loadCategories(){
  const select = document.getElementById("categorySelect");
  select.innerHTML = "";

  Object.keys(allData).forEach(cat=>{
    let option = document.createElement("option");
    option.value = cat;
    option.textContent = cat.toUpperCase();
    select.appendChild(option);
  });

  select.addEventListener("change", selectCategory);
}

function selectCategory(){
  const selected = document.getElementById("categorySelect").value;
  words = [];

  allData[selected].forEach(item=>{
    words.push({word:item.dogru, correct:true});
    words.push({word:item.yanlis, correct:false});
  });

  document.getElementById("libraryInfo").innerText =
    "Bu kategoride toplam " + words.length + " kelime var";

  score = 0;
  document.getElementById("score").innerText = score;

  newWord();
}

function newWord(){
  currentWord = words[Math.floor(Math.random()*words.length)];
  document.getElementById("word").innerText = currentWord.word;
}

function checkAnswer(answer){
  if(answer === currentWord.correct){
    score++;
  } else {
    score--;
  }
  document.getElementById("score").innerText = score;
  newWord();
}

function saveScore(){
  let username = document.getElementById("username").value;
  if(username.trim()==="") return alert("İsim gir");

  let board = JSON.parse(localStorage.getItem("leaderboard")) || [];
  board.push({name:username, score:score});
  board.sort((a,b)=>b.score-a.score);
  localStorage.setItem("leaderboard", JSON.stringify(board));

  displayLeaderboard();
}

function displayLeaderboard(){
  let board = JSON.parse(localStorage.getItem("leaderboard")) || [];
  let div = document.getElementById("leaderboard");
  div.innerHTML="";

  board.slice(0,10).forEach((p,i)=>{
    div.innerHTML += `<div class="leader-item">${i+1}. ${p.name} - ${p.score}</div>`;
  });
}

</script>

</body>
</html>
